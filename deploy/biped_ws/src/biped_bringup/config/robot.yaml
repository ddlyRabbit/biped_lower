# Biped Robot Motor Configuration
# Dual CAN bus via Waveshare 2-CH CAN HAT (MCP2515 × 2)
# can0: Right leg (SPI0 CE1), can1: Left leg (SPI0 CE0)

can0:
  interface: can0
  motors:
    R_hip_pitch:   {id: 1,  type: RS04}
    R_hip_roll:    {id: 2,  type: RS03}
    R_hip_yaw:     {id: 3,  type: RS03}
    R_knee:        {id: 4,  type: RS04}
    R_foot_top:  {id: 5,  type: RS02}
    R_foot_bottom:   {id: 6,  type: RS02}

can1:
  interface: can1
  motors:
    L_hip_pitch:   {id: 7,  type: RS04}
    L_hip_roll:    {id: 8,  type: RS03}
    L_hip_yaw:     {id: 9,  type: RS03}
    L_knee:        {id: 10, type: RS04}
    L_foot_top:  {id: 11, type: RS02}
    L_foot_bottom:   {id: 12, type: RS02}
