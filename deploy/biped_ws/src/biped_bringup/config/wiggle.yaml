# Wiggle test configuration
# pos/neg: range above/below default position (radians)
# frequency: sine wave frequency (Hz)
# duration_per_joint: seconds per joint in sequential mode

wiggle:
  frequency: 1.0
  duration_per_joint: 3.0

  joints:
    R_hip_pitch:   { pos: 0.087, neg: -0.087, freq: 1.0 }
    R_hip_roll:    { pos: 0.087, neg: -0.087, freq: 1.0 }
    R_hip_yaw:     { pos: 0.087, neg: -0.087, freq: 1.0 }
    R_knee:        { pos: 0.087, neg: -0.087, freq: 1.0 }
    R_foot_pitch:  { pos: 0.087, neg: -0.087, freq: 1.0 }
    R_foot_roll:   { pos: 0.087, neg: -0.087, freq: 1.0 }
    L_hip_pitch:   { pos: 0.087, neg: -0.087, freq: 1.0 }
    L_hip_roll:    { pos: 0.087, neg: -0.087, freq: 1.0 }
    L_hip_yaw:     { pos: 0.087, neg: -0.087, freq: 1.0 }
    L_knee:        { pos: 0.087, neg: -0.087, freq: 1.0 }
    L_foot_pitch:  { pos: 0.087, neg: -0.087, freq: 1.0 }
    L_foot_roll:   { pos: 0.087, neg: -0.087, freq: 1.0 }
