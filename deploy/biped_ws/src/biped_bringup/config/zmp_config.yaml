# ZMP Walking Configuration
# Loaded directly by zmp_trajectory_node (not ROS2 params)
# Edit values here, send WALK_ZMP again to apply

# Gait parameters — ASIMO-style safe gait
step_length: 0.05       # meters forward per step
step_width: 0.25        # meters lateral (foot-to-foot, matches standing pose)
step_height: 0.03       # swing foot clearance (meters)
step_period: 3.0        # seconds per step (slow, deliberate)
num_steps: 6            # number of steps
double_support_ratio: 0.5  # 50% of step in double support (weight transfer)

# Robot geometry (from pinocchio FK)
com_height: 0.40        # CoM height above ground (meters)

# Preview controller
preview_horizon: 320    # look-ahead samples

# Control
dt: 0.01                # control timestep (100Hz)

# URDF
urdf_path: /home/roy/biped_lower/urdf/light/robot.urdf
